# financialStatements の開発環境定義（mise）
#
# このディレクトリに入ると node / pnpm が自動で下記バージョンへ切り替わる。
# パッケージ依存そのものは pnpm + pnpm-lock.yaml が解決し、mise は
# 「正しいランタイムの用意 → pnpm install → vite 起動」をタスクとして束ねる。
#
# よく使うコマンド:
#   mise install        # node/pnpm を導入（初回のみ）
#   mise run dev         # 依存を入れて開発サーバ起動
#   mise run build       # 本番ビルド
#   mise run preview     # ビルド結果のプレビュー

[tools]
# node は 24 系の最新、pnpm は最新を取得する。
# グローバル設定の node = "lts" をこのディレクトリでは上書きする。
# "24" / "latest" は解決時に実バージョンへ確定し、mise.lock（lockfile=true）に固定される。
node = "24"
pnpm = "latest"

[tasks.install]
description = "pnpm で依存をインストール（入力に変化が無ければスキップ）"
run = "pnpm install"
# pnpm-workspace.yaml（ビルド承認等の設定）/ mise.lock（pnpm 実版）も入力に含め、
# これらの変更時に再インストールが走るようにする。
sources = ["package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml", "mise.toml", "mise.lock"]
# pnpm はインストール時に node_modules/.pnpm/lock.yaml を生成するため出力判定に使える。
outputs = ["node_modules/.pnpm/lock.yaml"]

[tasks.dev]
description = "依存を入れて vite 開発サーバを起動"
run = "node --run dev"
depends = ["install"]

[tasks.build]
description = "本番ビルド（vite build）"
run = "node --run build"
depends = ["install"]

[tasks.preview]
description = "ビルド結果をローカルでプレビュー"
run = "node --run preview"
depends = ["install"]

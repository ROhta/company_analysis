name: Deploy financialStatements to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# GitHub Pagesへのデプロイに必要な権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（進行中のデプロイはキャンセルしない）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # 注: mise は CI 環境を検知すると設定を自動 trust するため MISE_TRUSTED_CONFIG_PATHS は不要。
    # job レベル env では ${{ github.workspace }} が利用不可で startup_failure になるため設定しない。
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # node / pnpm のバージョンは financialStatements/mise.toml + mise.lock を単一ソースとして
      # mise で導入する（ローカル開発と完全に同一の版: node 24.16.0 / pnpm 11.5.2）
      - name: Setup mise (node / pnpm)
        uses: jdx/mise-action@v4
        with:
          working_directory: financialStatements

      - name: Install dependencies
        working-directory: financialStatements
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: financialStatements
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy/financialStatements
          cp -r financialStatements/dist/* deploy/financialStatements/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

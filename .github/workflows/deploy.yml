name: Deploy financialStatements to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# GitHub Pagesへのデプロイに必要な権限設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（進行中のデプロイはキャンセルしない）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # mise は CI 環境を検知すると設定を自動 trust するため MISE_TRUSTED_CONFIG_PATHS 等は不要。
    # 全 action は SHA 固定（リポジトリ設定の "Require actions to be pinned to a full-length commit SHA" 対応）。
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # node / pnpm のバージョンは financialStatements/mise.toml + mise.lock を単一ソースとして
      # mise で導入する（ローカル開発と完全に同一の版: node 24.16.0 / pnpm 11.5.2）
      - name: Setup mise (node / pnpm)
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          working_directory: financialStatements

      - name: Install dependencies
        working-directory: financialStatements
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: financialStatements
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy/financialStatements
          cp -r financialStatements/dist/* deploy/financialStatements/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

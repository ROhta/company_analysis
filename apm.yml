name: company_analysis
version: 1.0.0
description: 株式分析ツール群リポジトリの AI エージェント設定
author: ROhta
license: AGPL-3.0-or-later
type: instructions
targets: [claude, codex, copilot]
includes: auto
dependencies:
  mcp:
    # リポジトリ固有 MCP。共通セット (context7 / serena / chrome-devtools / deepwiki) の
    # Source of Truth は apm-config/mcp-toolkit 側。詳細は .claude/rules/mcp-servers.md 参照。
    # flint-chart: Flint（チャート仕様生成の中間言語）の MCP サーバ。data + semantic_types +
    # chart_spec から最適化済みの Vega-Lite / ECharts / Chart.js spec を生成・描画する。
    # flint-chart-mcp は APM レジストリ未登録のため self-defined（レジストリ優先方針のフォールバック）。
    # pin 必須方針に従い npm バージョンを @0.2.0 に固定（@latest 禁止）。
    - name: flint-chart
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "flint-chart-mcp@0.2.0"
  apm:
    # apm-config 自身の共通パッケージ（base / mcp-toolkit）は apm.lock.yaml をコミットする運用のため
    # #main 参照でよい。lock が解決済み SHA（resolved_commit）を固定し、apm update するまでドリフトしない。
    # 外部サードパーティ（obra/superpowers 等）は #sha 必須。詳細は .claude/rules/apm-plugins.md
    # 「バージョン固定」節・apm-config README を参照。
    - ROhta/apm-config/base#main
    - ROhta/apm-config/mcp-toolkit#main
